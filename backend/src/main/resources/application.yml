server:
  port: ${SERVER_PORT:8080}

spring:
  datasource:
    # Hard Rule: no hardcoded secrets — 모든 DB 접속 정보는 환경변수
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:esports_db}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      # 스키마 변경은 Flyway가 담당 — validate 모드 유지
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

# JWT 설정 (Hard Rule: no hardcoded secrets)
jwt:
  secret: ${JWT_SECRET}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

# 어드민 자격증명 (Hard Rule: no hardcoded secrets)
admin:
  username: ${ADMIN_USERNAME}
  password: ${ADMIN_PASSWORD}

# 쿠키 보안 설정 — HTTPS 운영 환경에서 true (COOKIE_SECURE=true)
cookie:
  secure: ${COOKIE_SECURE:false}

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  upload-dir: ${UPLOAD_DIR:uploads}

# AI 기능 설정 (Hard Rule: feature flag default OFF)
ai:
  enabled: ${AI_ENABLED:false}
  daily-cost-limit-usd: ${AI_DAILY_COST_LIMIT_USD:1.00}
  gemini-api-key: ${GEMINI_API_KEY:}
  claude-api-key: ${CLAUDE_API_KEY:}
  claude-model: ${AI_MODEL:gemini-2.0-flash}
  claude-input-cost-per-1k-tokens: 0.0
  claude-output-cost-per-1k-tokens: 0.0

# PandaScore API 설정 (Hard Rule: no hardcoded secrets)
pandascore:
  api-key: ${PANDASCORE_API_KEY:}
  base-url: https://api.pandascore.co
  scheduler-enabled: ${PANDASCORE_SCHEDULER_ENABLED:false}
  connect-timeout-ms: ${PANDASCORE_CONNECT_TIMEOUT_MS:3000}
  read-timeout-ms: ${PANDASCORE_READ_TIMEOUT_MS:10000}
